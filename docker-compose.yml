name: relaydeck

services:
  app:
    image: ghcr.io/fausto2022/relaydeck:${IMAGE_TAG:-edge}
    restart: unless-stopped
    command: ["-config", "/app/data/config.yaml"]
    environment:
      TZ: Asia/Shanghai
      SERVER_PORT: 8418
      DATABASE_DRIVER: sqlite
      DATABASE_PATH: /app/data/relaydeck.db
      SERVER_MODE: ${SERVER_MODE:-release}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      APP_SECRET: ${APP_SECRET:?APP_SECRET is required, set it in .env}
      # 仅在 data/config.yaml 尚未保存 auth 配置时用于首次初始化；之后以系统设置为准。
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      AUTH_TOKEN_SECRET: ${AUTH_TOKEN_SECRET:-}
    ports:
      - "${HTTP_PORT:-8080}:8418"
    volumes:
      - ./data:/app/data
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8418/healthz >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
